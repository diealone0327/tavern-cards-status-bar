 商城</div><p data-v-6fdf5bff>消耗积分兑换道具、丹药、法宝、武器、技能、属性点等。支持灵石1:10代替积分支付（身体强化除外）。</p></div><div class="intro-section" data-v-6fdf5bff><div class="intro-s-title" data-v-6fdf5bff>💪 身体强化</div><p data-v-6fdf5bff>力量·速度·防御·抗性四项，每项1~100级。在商城中消耗积分手动升级，不会随时间自动增长。</p><p style="margin-top:3px;" data-v-6fdf5bff>每10级对应一个修仙境界：<br data-v-6fdf5bff> 1~10凡人 → 11~20炼气 → 21~30筑基 → 31~40金丹 → 41~50元婴 → 51~60化神 → 61~70合体 → 71~80大乘 → 81~90渡劫</p></div><div class="intro-section" data-v-6fdf5bff><div class="intro-s-title" data-v-6fdf5bff>🎒 系统背包</div><p data-v-6fdf5bff>购买物品自动存入，无限容量，仅主角可见可用，第三人无法感知、搜索或抢夺。修仙界拾取/获赠/发现的物品也会自动存入杂物栏。</p></div><div class="intro-section" data-v-6fdf5bff><div class="intro-s-title" data-v-6fdf5bff>❤️ NPC关系</div><p data-v-6fdf5bff>好感度(0~300)和沉沦(0~100,女角专属)。积极互动/送礼增加好感，亲密接触增加沉沦。</p></div></div>',1))])])):(0,c.createCommentVNode)('v-if',!0),(0,c.createElementVNode)('div',h,[(0,c.createElementVNode)('div',C,[n[6]||(n[6]=(0,c.createElementVNode)('span',{class:'stat-label'},'积分',-1)),(0,c.createElementVNode)('span',S,(0,c.toDisplayString)(e.system.积分??0),1)]),(0,c.createElementVNode)('div',D,[n[8]||(n[8]=(0,c.createElementVNode)('span',{class:'stat-label'},'签到',-1)),(0,c.createElementVNode)('span',w,[n[7]||(n[7]=(0,c.createTextVNode)(' ✅ 已签到',-1)),e.system.今日签到积分?((0,c.openBlock)(),(0,c.createElementBlock)('span',x,'+'+(0,c.toDisplayString)(e.system.今日签到积分),1)):(0,c.createCommentVNode)('v-if',!0)])]),(0,c.createElementVNode)('div',P,[n[9]||(n[9]=(0,c.createElementVNode)('span',{class:'stat-label'},'任务',-1)),(0,c.createElementVNode)('span',{class:(0,c.normalizeClass)(['stat-value',e.system.今日任务?'success':'danger']),style:{'font-size':'14px'}},(0,c.toDisplayString)(e.system.今日任务?'✅ 已完成':'⬜ 未完成'),3)])]),n[11]||(n[11]=(0,c.createElementVNode)('div',{class:'divider'},null,-1)),(0,c.createElementVNode)('div',A,[n[10]||(n[10]=(0,c.createElementVNode)('span',{class:'stat-label'},'当前日期',-1)),(0,c.createElementVNode)('span',F,[l.value.year?((0,c.openBlock)(),(0,c.createElementBlock)('span
